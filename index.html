<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅東鎮公所停車費計算系統</title>
    <!-- 載入 React 與 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 14pt;
        }
        .text-14pt { font-size: 14pt; }
        .text-24pt { font-size: 24pt; }
        .text-32pt { font-size: 32pt; }
        .text-56pt { font-size: 56pt; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        /* 避免內容切割的滾動條樣式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a5a58d; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f2f4f3] min-h-screen py-4 md:py-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const minuteOptions = useMemo(() => Array.from({ length: 12 }, (_, i) => i * 5), []);
            const hourOptions = useMemo(() => Array.from({ length: 24 }, (_, i) => i), []);

            const getInitialEntryState = () => {
                const date = new Date();
                date.setDate(date.getDate() - 1);
                return { 
                    date: date.toISOString().split('T')[0], 
                    hour: 14, 
                    minute: 30 
                };
            };

            const getInitialExitState = () => {
                const date = new Date();
                return { 
                    date: date.toISOString().split('T')[0], 
                    hour: 10, 
                    minute: 0 
                };
            };

            const [entry, setEntry] = useState(getInitialEntryState());
            const [exit, setExit] = useState(getInitialExitState());
            const [useDiscount, setUseDiscount] = useState(true);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');

            const DAY_30MIN_RATE = 15;
            const NIGHT_30MIN_RATE = 5;

            const calculateFee = () => {
                const startDate = new Date(`${entry.date}T${String(entry.hour).padStart(2, '0')}:${String(entry.minute).padStart(2, '0')}:00`);
                const endDate = new Date(`${exit.date}T${String(exit.hour).padStart(2, '0')}:${String(exit.minute).padStart(2, '0')}:00`);

                if (endDate <= startDate) {
                    setError('離場時間必須晚於進場時間');
                    setResult(null);
                    return;
                }

                setError('');
                const totalMinutes = (endDate - startDate) / 60000;
                let billableUnits = 0;

                if (totalMinutes <= 60) {
                    billableUnits = 2;
                } else {
                    const excessMinutes = totalMinutes - 60;
                    const extraUnits = Math.ceil(excessMinutes / 30);
                    billableUnits = 2 + extraUnits;
                }

                let totalFee = 0;
                let current = new Date(startDate.getTime());
                
                for (let i = 0; i < billableUnits; i++) {
                    const hour = current.getHours();
                    const isDaytime = hour >= 8 && hour < 23;
                    totalFee += isDaytime ? DAY_30MIN_RATE : NIGHT_30MIN_RATE;
                    current.setMinutes(current.getMinutes() + 30);
                }

                const originalFee = totalFee;
                let finalFee = Math.max(0, totalFee - (useDiscount ? 240 : 0));

                setResult({
                    fee: finalFee,
                    originalFee,
                    hours: Math.floor(totalMinutes / 60),
                    minutes: Math.floor(totalMinutes % 60)
                });
            };

            return (
                <div className="container mx-auto px-4 flex items-center justify-center">
                    <div className="max-w-6xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-[#d8e2dc] flex flex-col md:flex-row md:min-h-[650px]">
                        
                        {/* 左側輸入區 (莫蘭迪綠) */}
                        <div className="w-full md:w-[45%] bg-[#d8e2dc]/40 p-6 md:p-10 flex flex-col border-b md:border-b-0 md:border-r border-[#a5a58d]/20">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="p-3 bg-[#6b705c] rounded-2xl text-white shadow-lg shrink-0">
                                    <Icon name="clock" />
                                </div>
                                <div>
                                    <h1 className="text-14pt font-black text-[#404740] tracking-tight">羅東鎮公所</h1>
                                    <p className="text-14pt text-[#6b705c] font-black opacity-90 leading-tight">停車費計算系統</p>
                                </div>
                            </div>

                            <div className="space-y-6 flex-grow">
                                <div className="space-y-2">
                                    <label className="text-14pt font-black text-[#6b705c] flex items-center gap-2">
                                        <Icon name="calendar" className="text-[#a5a58d]" size={20} /> 停入時間
                                    </label>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        <input type="date" className="p-2 bg-white border border-[#a5a58d]/40 rounded-xl outline-none text-[#404740] font-bold text-14pt w-full" value={entry.date} onChange={e => setEntry({...entry, date: e.target.value})} />
                                        <div className="flex gap-2">
                                            <div className="relative flex-1">
                                                <select className="w-full p-2 bg-white border border-[#a5a58d]/40 rounded-xl outline-none text-[#404740] font-bold text-14pt" value={entry.hour} onChange={e => setEntry({...entry, hour: parseInt(e.target.value)})}>
                                                    {hourOptions.map(h => <option key={h} value={h}>{String(h).padStart(2, '0')}時</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={18} className="absolute right-2 top-1/2 -translate-y-1/2 text-[#a5a58d] pointer-events-none" />
                                            </div>
                                            <div className="relative flex-1">
                                                <select className="w-full p-2 bg-white border border-[#a5a58d]/40 rounded-xl outline-none text-[#404740] font-bold text-14pt" value={entry.minute} onChange={e => setEntry({...entry, minute: parseInt(e.target.value)})}>
                                                    {minuteOptions.map(m => <option key={m} value={m}>{String(m).padStart(2, '0')}分</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={18} className="absolute right-2 top-1/2 -translate-y-1/2 text-[#a5a58d] pointer-events-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-14pt font-black text-[#6b705c] flex items-center gap-2">
                                        <Icon name="clock" className="text-[#a5a58d]" size={20} /> 離場時間
                                    </label>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        <input type="date" className="p-2 bg-white border border-[#a5a58d]/40 rounded-xl outline-none text-[#404740] font-bold text-14pt w-full" value={exit.date} onChange={e => setExit({...exit, date: e.target.value})} />
                                        <div className="flex gap-2">
                                            <div className="relative flex-1">
                                                <select className="w-full p-2 bg-white border border-[#a5a58d]/40 rounded-xl outline-none text-[#404740] font-bold text-14pt" value={exit.hour} onChange={e => setExit({...exit, hour: parseInt(e.target.value)})}>
                                                    {hourOptions.map(h => <option key={h} value={h}>{String(h).padStart(2, '0')}時</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={18} className="absolute right-2 top-1/2 -translate-y-1/2 text-[#a5a58d] pointer-events-none" />
                                            </div>
                                            <div className="relative flex-1">
                                                <select className="w-full p-2 bg-white border border-[#a5a58d]/40 rounded-xl outline-none text-[#404740] font-bold text-14pt" value={exit.minute} onChange={e => setExit({...exit, minute: parseInt(e.target.value)})}>
                                                    {minuteOptions.map(m => <option key={m} value={m}>{String(m).padStart(2, '0')}分</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={18} className="absolute right-2 top-1/2 -translate-y-1/2 text-[#a5a58d] pointer-events-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className={`flex items-center justify-between p-4 rounded-2xl cursor-pointer border-2 shadow-sm transition-all ${useDiscount ? 'bg-[#b7b7a4]/30 border-[#6b705c]' : 'bg-white border-transparent hover:border-[#b7b7a4]/40'}`} onClick={() => setUseDiscount(!useDiscount)}>
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-lg shrink-0 ${useDiscount ? 'bg-[#6b705c] text-white' : 'bg-[#d8e2dc] text-[#a5a58d]'}`}>
                                            <Icon name="ticket" size={24} />
                                        </div>
                                        <div className="flex flex-col">
                                            <span className={`font-black text-14pt leading-tight ${useDiscount ? 'text-[#404740]' : 'text-[#a5a58d]'}`}>折抵 240 元</span>
                                            {useDiscount && <span className="text-[10pt] font-bold text-[#6b705c]">已成功套用</span>}
                                        </div>
                                    </div>
                                    {useDiscount && <Icon name="check-circle-2" className="text-[#6b705c]" size={24} />}
                                </div>
                            </div>

                            <div className="mt-8">
                                {error && <div className="mb-4 flex items-center gap-2 text-[#d62828] bg-red-50 p-3 rounded-xl text-14pt font-bold border border-red-100 shrink-0"><Icon name="info" size={20} /> {error}</div>}
                                <button onClick={calculateFee} className="w-full py-4 bg-[#6b705c] hover:bg-[#404740] text-white rounded-2xl font-black text-14pt shadow-xl shadow-[#6b705c]/20 transition-all flex items-center justify-center gap-3 tracking-widest active:scale-95">
                                    <Icon name="calculator" size={24} /> 開始計算
                                </button>
                            </div>
                        </div>

                        {/* 右側結果顯示區 (白色) */}
                        <div className="w-full md:w-[55%] p-6 md:p-10 flex flex-col justify-center bg-white min-h-[400px]">
                            {!result ? (
                                <div className="text-center space-y-5 py-12">
                                    <div className="w-24 h-24 bg-[#f8f9f8] rounded-full flex items-center justify-center mx-auto mb-4 text-[#ced4ce]"><Icon name="receipt" size={64} /></div>
                                    <p className="text-[#a5a58d] font-black text-14pt tracking-tight">請設定停車時間後點擊計算</p>
                                    <div className="flex justify-center gap-6 text-14pt text-[#6b705c] opacity-60 font-black border-t border-[#f8f9f8] pt-6 tracking-tighter">
                                        <span>日間 $30/HR</span>
                                        <span>|</span>
                                        <span>夜間 $10/HR</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-in fade-in slide-in-from-right-4 duration-500 flex flex-col h-full">
                                    <div className="flex items-center gap-3 mb-6 pb-4 border-b border-[#f8f9f8] shrink-0">
                                        <Icon name="timer" className="text-[#a5a58d]" size={24} />
                                        <h2 className="text-14pt font-black text-[#6b705c] tracking-tight">結算明細</h2>
                                    </div>
                                    
                                    <div className="mb-6 shrink-0">
                                        <div className="p-6 bg-[#f8f9f8] rounded-[2.5rem] border border-[#e2e8e2] text-center shadow-inner">
                                            <p className="text-14pt text-[#a5a58d] mb-1 font-black tracking-widest uppercase">總停車時間</p>
                                            <p className="text-24pt md:text-32pt font-black text-[#404740] leading-none">
                                                {result.hours} <span className="text-14pt md:text-[18pt] text-[#a5a58d] font-bold">時</span> {result.minutes} <span className="text-14pt md:text-[18pt] text-[#a5a58d] font-bold">分</span>
                                            </p>
                                        </div>
                                    </div>

                                    <div className="text-center py-4 shrink-0">
                                        <div className="inline-flex flex-wrap items-baseline justify-center gap-x-3">
                                            <span className="text-14pt font-black text-[#a5a58d]">應付金額 NT$</span>
                                            <span className="text-56pt md:text-64pt font-black text-[#6b705c] leading-none tracking-tighter">
                                                {result.fee}
                                            </span>
                                        </div>
                                        {useDiscount && result.originalFee !== result.fee && (
                                            <div className="mt-4 flex flex-col items-center">
                                                <p className="text-14pt font-black text-[#6b705c] bg-[#d8e2dc] px-6 py-2 rounded-full mb-1 shadow-sm">已扣除折抵 240 元</p>
                                                <p className="text-[#adb5bd] text-14pt font-bold line-through">原價 NT$ {result.originalFee}</p>
                                            </div>
                                        )}
                                    </div>

                                    <div className="mt-6 p-5 bg-[#d8e2dc]/30 rounded-3xl border border-dashed border-[#a5a58d]/50 shrink-0">
                                        <div className="flex items-start gap-3 text-14pt text-[#6b705c] leading-snug font-bold">
                                            <Icon name="info" className="shrink-0 mt-1 opacity-80" size={24} />
                                            <div className="space-y-1">
                                                <p>停車未滿一小時，以一小時計費。</p>
                                                <p>逾一小時後，逾半小時內以 30 分鐘計；超過半小時以 1 小時計。</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
